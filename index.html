<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'">
  <title>人机协同作业批改研究原型</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #d8dee4;
      --panel: #ffffff;
      --soft: #f6f8fa;
      --blue: #2457a6;
      --green: #24745a;
      --red: #a23b3b;
      --amber: #8a5a00;
      --focus: #0b57d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f5f7;
      color: var(--ink);
      font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.55;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .wrap {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding: 28px 0 22px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      max-width: 820px;
      font-size: 14px;
    }

    .notice {
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      max-width: 360px;
    }

    main {
      padding: 22px 0 34px;
    }

    .grid {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      gap: 16px;
      align-items: start;
    }

    section, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      font-size: 16px;
    }

    .panel-head p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .filters {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 4px;
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
      text-align: left;
    }

    button:hover, button:focus-visible {
      border-color: var(--focus);
      outline: none;
    }

    button.active {
      border-color: var(--blue);
      background: #eef4ff;
      color: var(--blue);
      font-weight: 600;
    }

    .case-list {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
    }

    .case {
      width: 100%;
      display: grid;
      gap: 5px;
      padding: 10px;
    }

    .case strong {
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      display: inline-block;
      width: fit-content;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 12px;
      background: var(--soft);
      color: var(--muted);
    }

    .tag.review {
      background: #fff4db;
      color: var(--amber);
    }

    .tag.risk {
      background: #fdecec;
      color: var(--red);
    }

    .detail {
      min-height: 520px;
    }

    .detail-body {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: var(--soft);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 18px;
    }

    .block {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .block h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .evidence {
      margin: 0;
      padding: 12px;
      background: #fbfbfc;
      border-left: 3px solid var(--blue);
      color: #303134;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 4px;
    }

    .primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      text-align: center;
    }

    .secondary {
      text-align: center;
    }

    .status {
      min-height: 22px;
      color: var(--green);
      font-size: 13px;
    }

    .summary {
      display: grid;
      gap: 12px;
      padding: 14px 16px;
    }

    .bar {
      display: grid;
      gap: 5px;
    }

    .bar label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }

    .track {
      height: 8px;
      background: #edf0f2;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: var(--blue);
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 980px) {
      .top, .grid {
        grid-template-columns: 1fr;
      }

      .notice {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100vw - 20px, 1180px);
      }

      .score-row {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>人机协同作业批改研究原型</h1>
        <p class="subtitle">面向基础教育作业反馈的概念系统。界面展示风险分流、证据呈现和教师复核记录，不展示真实学生数据，也不构成产品效果声明。</p>
      </div>
      <p class="notice">独立概念研究。样本、姓名、班级、分数均为合成材料；“记录复核决定”仅改变本地页面状态。</p>
    </div>
  </header>

  <main class="wrap grid">
    <aside>
      <div class="panel-head">
        <h2>复核队列</h2>
        <p>按题型风险与教学价值排序</p>
      </div>
      <div class="filters" aria-label="筛选案例">
        <button class="active" data-filter="all">全部案例</button>
        <button data-filter="review">需要教师复核</button>
        <button data-filter="risk">高风险样本</button>
        <button data-filter="auto">低风险自动通过</button>
      </div>
      <div class="case-list" id="case-list"></div>
    </aside>

    <section class="detail" aria-live="polite">
      <div class="panel-head">
        <h2 id="case-title">案例详情</h2>
        <p id="case-subtitle"></p>
      </div>
      <div class="detail-body">
        <div class="score-row">
          <div class="metric">
            <span>建议分</span>
            <strong id="model-score"></strong>
          </div>
          <div class="metric">
            <span>裁定参考</span>
            <strong id="reference-score"></strong>
          </div>
          <div class="metric">
            <span>置信度</span>
            <strong id="confidence"></strong>
          </div>
          <div class="metric">
            <span>分流路径</span>
            <strong id="route"></strong>
          </div>
        </div>

        <div class="block">
          <h3>作答证据</h3>
          <p class="evidence" id="evidence"></p>
        </div>

        <div class="block">
          <h3>教师可复核假设</h3>
          <p id="hypothesis"></p>
        </div>

        <div class="block">
          <h3>建议反馈</h3>
          <p id="feedback"></p>
        </div>

        <div class="actions">
          <button class="primary" id="record-decision">记录复核决定（原型）</button>
          <button class="secondary" id="mark-face">加入面批清单</button>
          <button class="secondary" id="mark-rule">标记规则冲突</button>
        </div>
        <p class="status" id="status"></p>
      </div>
    </section>

    <aside>
      <div class="panel-head">
        <h2>合成样本概览</h2>
        <p>由当前五个展示案例实时计算</p>
      </div>
      <div class="summary" id="summary"></div>
      <p class="note">该概览只描述原型中的五个合成案例，不代表真实准确率、节时效果或学习增益。</p>
    </aside>
  </main>

  <script>
    const cases = [
      {
        id: "C01",
        student: "学生A01",
        subject: "数学",
        item: "有理数运算",
        type: "objective",
        risk: "none",
        route: "auto",
        modelScore: "1/1",
        referenceScore: "1/1",
        confidence: 0.98,
        evidence: "原作答与标准答案一致，版面识别无冲突。",
        hypothesis: "低风险结构化题目，可自动通过并进入抽样监测。",
        feedback: "保留当前解法。订正任务无需追加，只需在错题本中记录同类题完成情况。"
      },
      {
        id: "C02",
        student: "学生A03",
        subject: "数学",
        item: "几何判定",
        type: "objective",
        risk: "review",
        route: "review",
        modelScore: "1/1",
        referenceScore: "0/1",
        confidence: 0.83,
        evidence: "模型判定为正确，但手写区域存在擦改痕迹；教师裁定参考为错误。",
        hypothesis: "可能存在识别冲突，需教师核对原图与判定规则。",
        feedback: "请先标出判定条件缺失处，再补写一条可验证的理由。"
      },
      {
        id: "C03",
        student: "学生A11",
        subject: "语文",
        item: "写作立意",
        type: "subjective",
        risk: "review",
        route: "review",
        modelScore: "86/100",
        referenceScore: "87/100",
        confidence: 0.58,
        evidence: "文本能够围绕中心展开，但第二段论据与主题关联较弱。",
        hypothesis: "开放表达题应由教师确认评分证据和评语措辞。",
        feedback: "保留第一段的中心句，第二段补充一个与主题直接相关的具体事例。"
      },
      {
        id: "C04",
        student: "学生A15",
        subject: "数学",
        item: "几何证明",
        type: "subjective",
        risk: "risk",
        route: "face",
        modelScore: "6/10",
        referenceScore: "7/10",
        confidence: 0.43,
        evidence: "关键步骤缺少辅助线来源，结论成立但证明链不完整。",
        hypothesis: "连续步骤缺失可能影响后续证明题，需要面批确认思路。",
        feedback: "先补出辅助线依据，再用两句话说明角度关系如何推出最终结论。"
      },
      {
        id: "C05",
        student: "学生A18",
        subject: "语文",
        item: "说明顺序",
        type: "subjective",
        risk: "risk",
        route: "review",
        modelScore: "74/100",
        referenceScore: "78/100",
        confidence: 0.72,
        evidence: "答案提到时间顺序，但未解释段落之间的证据关系。",
        hypothesis: "属于需人工关注的作答变化，不能解释为情绪或能力诊断。",
        feedback: "请在答案中引用两个段落标志词，并说明它们如何构成说明顺序。"
      }
    ];

    const routeText = {
      auto: "自动通过",
      review: "教师复核",
      face: "面批建议"
    };

    let selected = cases[0];
    let filter = "all";

    const list = document.querySelector("#case-list");
    const summary = document.querySelector("#summary");
    const status = document.querySelector("#status");

    function visibleCases() {
      return cases.filter((item) => {
        if (filter === "all") return true;
        if (filter === "auto") return item.route === "auto";
        if (filter === "review") return item.route !== "auto";
        if (filter === "risk") return item.risk === "risk";
        return true;
      });
    }

    function renderList() {
      const visible = visibleCases();
      list.innerHTML = "";
      visible.forEach((item) => {
        const button = document.createElement("button");
        button.className = "case" + (item.id === selected.id ? " active" : "");
        button.innerHTML = `
          <strong>${item.student} · ${item.subject}${item.item}</strong>
          <span class="meta">${item.type === "objective" ? "客观题" : "主观题"} · ${routeText[item.route]}</span>
          <span class="tag ${item.risk === "risk" ? "risk" : item.route === "auto" ? "" : "review"}">${item.risk === "none" ? "低风险" : item.risk === "risk" ? "高风险" : "需复核"}</span>
        `;
        button.addEventListener("click", () => {
          selected = item;
          status.textContent = "";
          render();
        });
        list.appendChild(button);
      });
      if (!visible.some((item) => item.id === selected.id) && visible[0]) {
        selected = visible[0];
      }
    }

    function renderDetail() {
      document.querySelector("#case-title").textContent = `${selected.student} · ${selected.subject}${selected.item}`;
      document.querySelector("#case-subtitle").textContent = `${selected.type === "objective" ? "客观题" : "主观题"} · ${routeText[selected.route]}`;
      document.querySelector("#model-score").textContent = selected.modelScore;
      document.querySelector("#reference-score").textContent = selected.referenceScore;
      document.querySelector("#confidence").textContent = `${Math.round(selected.confidence * 100)}%`;
      document.querySelector("#route").textContent = routeText[selected.route];
      document.querySelector("#evidence").textContent = selected.evidence;
      document.querySelector("#hypothesis").textContent = selected.hypothesis;
      document.querySelector("#feedback").textContent = selected.feedback;
    }

    function bar(label, value, total) {
      const pct = total === 0 ? 0 : Math.round((value / total) * 100);
      return `
        <div class="bar">
          <label><span>${label}</span><strong>${value}/${total}</strong></label>
          <div class="track"><div class="fill" style="width: ${pct}%"></div></div>
        </div>
      `;
    }

    function renderSummary() {
      const total = cases.length;
      const reviewCount = cases.filter((item) => item.route !== "auto").length;
      const highRisk = cases.filter((item) => item.risk === "risk").length;
      const subjective = cases.filter((item) => item.type === "subjective").length;
      const lowConfidence = cases.filter((item) => item.confidence < 0.75).length;
      summary.innerHTML = [
        bar("需教师介入", reviewCount, total),
        bar("高风险样本", highRisk, total),
        bar("主观题样本", subjective, total),
        bar("低置信度样本", lowConfidence, total)
      ].join("");
    }

    function render() {
      renderList();
      renderDetail();
      renderSummary();
    }

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        filter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach((node) => node.classList.remove("active"));
        button.classList.add("active");
        status.textContent = "";
        render();
      });
    });

    document.querySelector("#record-decision").addEventListener("click", () => {
      status.textContent = `已记录 ${selected.id} 的复核决定。该记录仅保存在当前页面会话中。`;
    });

    document.querySelector("#mark-face").addEventListener("click", () => {
      status.textContent = `已将 ${selected.id} 标记为面批候选。`;
    });

    document.querySelector("#mark-rule").addEventListener("click", () => {
      status.textContent = `已将 ${selected.id} 标记为规则冲突候选。`;
    });

    render();
  </script>
</body>
</html>
