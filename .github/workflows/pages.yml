name: pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Evaluate synthetic sample
        run: python analysis/evaluate.py data/evaluation-sample.csv

  deploy:
    needs: reproducibility
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare public site
        run: |
          mkdir site
          cp index.html site/
          cp README.md site/
          cp NOTICE.md site/
          cp REFERENCES.md site/
          cp -r docs site/docs
          cp -r assets site/assets
          cp -r reports site/reports
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
