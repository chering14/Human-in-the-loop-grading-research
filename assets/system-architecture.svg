<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">人机协同作业批改系统架构</title>
  <desc id="desc">展示作业采集、学科理解、评分反馈、风险分流、教师复核、订正再评价与治理层之间的关系。</desc>
  <style>
    .bg { fill: #f7f9fb; }
    .box { fill: #ffffff; stroke: #c9d3df; stroke-width: 1.4; rx: 8; }
    .box-strong { fill: #eef4ff; stroke: #2f5d9b; stroke-width: 1.6; rx: 8; }
    .box-risk { fill: #fff7e8; stroke: #9a6b16; stroke-width: 1.6; rx: 8; }
    .box-human { fill: #eef8f4; stroke: #2f765f; stroke-width: 1.6; rx: 8; }
    .label { font: 700 18px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #1f2328; }
    .small { font: 14px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #59636e; }
    .tiny { font: 12px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #6a737d; }
    .arrow { stroke: #59636e; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7a8590; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    .lane { fill: #ffffff; stroke: #d8dee4; stroke-width: 1; rx: 10; }
    .lane-title { font: 700 15px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #424a53; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#59636e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>

  <text x="52" y="48" class="label">面向基础教育作业反馈的人机协同批改框架</text>
  <text x="52" y="74" class="small">核心原则：模型提供证据与建议，风险分流决定工作流，教师保留最终裁量，真实效果由预注册评测验证。</text>

  <rect class="lane" x="40" y="105" width="1120" height="210"/>
  <text x="60" y="132" class="lane-title">业务与模型流程</text>

  <rect class="box" x="62" y="158" width="150" height="94"/>
  <text x="84" y="188" class="label">作业采集</text>
  <text x="82" y="216" class="small">扫描/拍摄/数字作业</text>
  <text x="82" y="238" class="tiny">保留原始证据</text>

  <rect class="box" x="250" y="158" width="150" height="94"/>
  <text x="272" y="188" class="label">版面解析</text>
  <text x="270" y="216" class="small">题目定位与识别</text>
  <text x="270" y="238" class="tiny">记录冲突区域</text>

  <rect class="box-strong" x="438" y="158" width="150" height="94"/>
  <text x="460" y="188" class="label">学科理解</text>
  <text x="458" y="216" class="small">量表/课标/规则</text>
  <text x="458" y="238" class="tiny">按题型独立校准</text>

  <rect class="box-strong" x="626" y="158" width="150" height="94"/>
  <text x="648" y="188" class="label">评分反馈</text>
  <text x="646" y="216" class="small">建议分与证据</text>
  <text x="646" y="238" class="tiny">生成可编辑评语</text>

  <rect class="box-risk" x="814" y="158" width="150" height="94"/>
  <text x="836" y="188" class="label">风险分流</text>
  <text x="834" y="216" class="small">置信度/题型/历史</text>
  <text x="834" y="238" class="tiny">阈值版本冻结</text>

  <rect class="box-human" x="1002" y="158" width="130" height="94"/>
  <text x="1022" y="188" class="label">教师复核</text>
  <text x="1020" y="216" class="small">改分/改评语</text>
  <text x="1020" y="238" class="tiny">最终裁量</text>

  <path class="arrow" d="M212 205 H250"/>
  <path class="arrow" d="M400 205 H438"/>
  <path class="arrow" d="M588 205 H626"/>
  <path class="arrow" d="M776 205 H814"/>
  <path class="arrow" d="M964 205 H1002"/>

  <rect class="lane" x="40" y="340" width="1120" height="130"/>
  <text x="60" y="367" class="lane-title">反馈闭环与治理约束</text>

  <rect class="box-human" x="92" y="390" width="190" height="54"/>
  <text x="118" y="423" class="label">订正反馈</text>

  <rect class="box-human" x="342" y="390" width="190" height="54"/>
  <text x="372" y="423" class="label">再评价</text>

  <rect class="box" x="592" y="390" width="190" height="54"/>
  <text x="617" y="423" class="label">审计日志</text>

  <rect class="box" x="842" y="390" width="250" height="54"/>
  <text x="870" y="423" class="label">数据最小化与权益保护</text>

  <path class="arrow" d="M1067 252 C1067 318, 187 320, 187 390"/>
  <path class="arrow" d="M282 417 H342"/>
  <path class="dash" d="M532 417 H592"/>
  <path class="dash" d="M782 417 H842"/>
  <path class="dash" d="M687 390 C687 335, 889 326, 889 252"/>

  <text x="62" y="292" class="tiny">低风险样本：自动通过或抽样复核；高不确定性、开放表达、识别冲突与严重误判风险：强制教师复核。</text>
  <text x="62" y="492" class="tiny">注：该图为概念架构，非生产系统部署图；所有性能指标须在独立盲评与预注册评测中估计。</text>
</svg>
